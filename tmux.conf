# ~/.tmux.conf — Tmux configuration

# ── Prefix key ───────────────────────────────────────────────────────────────
# Change prefix from Ctrl-b to Ctrl-a (screen-like)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ──────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
setw -g aggressive-resize on
set -sg escape-time 0           # no delay after pressing Escape in Vim

# ── Windows and panes ────────────────────────────────────────────────────────
set -g base-index 1             # start window numbering at 1
setw -g pane-base-index 1
set -g renumber-windows on      # renumber windows when one is closed

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with Vim-style hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift+arrow
bind -r S-Left  resize-pane -L 5
bind -r S-Down  resize-pane -D 5
bind -r S-Up    resize-pane -U 5
bind -r S-Right resize-pane -R 5

# ── Mouse ─────────────────────────────────────────────────────────────────────
set -g mouse on

# ── Copy mode (vi bindings) ───────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── Status bar ───────────────────────────────────────────────────────────────
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 40
set -g status-left "#[bold]  #S #[nobold]| "

set -g status-right-length 60
set -g status-right "#[fg=#a6e3a1]%Y-%m-%d #[fg=#89b4fa]%H:%M "

setw -g window-status-format         " #I:#W "
setw -g window-status-current-format "#[bold,fg=#89b4fa] #I:#W "

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
